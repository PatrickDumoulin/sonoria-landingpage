    <script type="application/ld+json">

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'implémentation complète prend 14 jours. Jour 1–3 : identification des procédures critiques. Jour 4–10 : capture du savoir-faire de vos experts (30 minutes max par employé). Jour 10–14 : livraison du système prêt à utiliser."

        },
        {
          "@type": "Question",
          "name": "Est-ce que le service Sonoria perturbe mes opérations de production ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. Nous demandons un maximum de 30 minutes par employé clé. Aucun projet IT à gérer, aucune formation longue, aucune perturbation de votre production."
          }
        },
        {
          "@type": "Question",
          "name": "À qui s'adresse le service Sonoria ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sonoria s'adresse aux PME manufacturières et de construction (10 à 200 employés) qui perdent du temps et de la productivité à cause d'un savoir-faire non documenté : interruptions fréquentes, erreurs évitables, intégration lente des nouveaux employés."
          }
        },
        {
          "@type": "Question",
          "name": "Quel est le coût du service Sonoria ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chaque mandat est personnalisé selon vos besoins. Nous commençons par un diagnostic gratuit de 10 minutes pour évaluer votre situation et identifier vos pertes de productivité. Aucune obligation d'achat."
          }
        },
        {
          "@type": "Question",
          "name": "Que se passe-t-il si un employé clé quitte l'entreprise ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "C'est précisément le problème que Sonoria résout. Le savoir-faire de vos experts est capturé et structuré dans le système avant leur départ. Même si un employé clé quitte, ses connaissances restent accessibles à toute l'équipe."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de temps prend la formation d'un nouvel employé avec Sonoria ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Avec le système Sonoria en place, les nouveaux employés deviennent autonomes dès la première semaine — au lieu de 3 à 6 semaines avec les méthodes traditionnelles. Ils trouvent les réponses eux-mêmes en quelques secondes, sans interrompre leurs collègues."
          }
        }
