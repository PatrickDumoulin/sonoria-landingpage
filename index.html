    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Combien de temps pour recevoir le premier rapport d'écarts ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le premier rapport d'écarts est livré en 5 jours ouvrables. Jour 1-2 : connexion à vos documents et configuration de la norme. Jour 3-4 : analyse automatique clause par clause. Jour 5 : livraison du rapport complet avec les non-conformités, les documents concernés et les niveaux de priorité."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce que Sonoria perturbe mes opérations ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. On se connecte à vos documents existants (SharePoint, OneDrive, Google Drive) sans déplacer quoi que ce soit. Aucune migration, aucun projet IT, aucune perturbation de vos opérations."
          }
        },
        {
          "@type": "Question",
          "name": "À qui s'adresse Sonoria ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sonoria s'adresse aux entreprises qui maintiennent une certification active : ISO 9001, SQF, CNESST, ISO 22000, AS9100, BPF, ISO 13485. Secteurs : manufacturing, agroalimentaire, construction, distribution. Interlocuteurs : Directeur Qualité, Plant Manager, Directeur Usine, CEO de PME."
          }
        },
        {
          "@type": "Question",
          "name": "Quel est le coût du service Sonoria ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chaque mandat est personnalisé selon votre certification et le nombre de procédures à analyser. Nous commençons par un diagnostic de conformité gratuit pour évaluer votre situation et identifier vos risques. Aucune obligation d'achat."
          }
        },
        {
          "@type": "Question",
          "name": "Comment Sonoria détecte-t-il les non-conformités ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Notre système compare automatiquement chaque procédure interne avec les exigences de votre norme de certification, clause par clause. Il identifie les écarts, les omissions et les contradictions, et génère un rapport précis avec le document concerné, la clause applicable et le niveau de priorité."
          }
        },
        {
          "@type": "Question",
          "name": "Que se passe-t-il quand ma norme se met à jour ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le système surveille en continu. Quand vos procédures changent ou quand la norme se met à jour, le système revérifie automatiquement et vous alerte sur ce qui doit être corrigé. Vous êtes toujours informé avant que l'auditeur ne trouve quoi que ce soit."
          }
        }
      ]
    }
    </script>
